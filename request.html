<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Form</title>
    <link rel="Stylesheet" href="style.css">

</head>

<body class="body">
        <img class="logo" src="assests/images/logo.png">

    <center>
        <h1 class="heading">CONTACT US</h1>

        <image class="img" src="assests/images/form-img.png" width="300" alt="thankyou_image"></image>




        <br>
    </center>
    <nav class="nav">

        <ul>
            <li><a href="index.html">Home Page</a></li>
            <li><a href="watch.html">Watch Anime</a></li>
            <li><a href="list.html">Anime List</a></li>

        </ul>
    </nav>
    <br>
    <div class="formpage">
        <p class="watchpara">
            Your responses help us upload and recommend anime that matches our community’s preferences.
        </p>
        <form class="form watchpara">
            <div class="input">
                <div>
                    <label>Enter Name: </label><br>
                    <label>Enter Email:</label><br>
                    <label>Enter Password:</label><br>
                </div>
                <div>
                    <input type="text" class="names" placeholder="John Doe"><br>
                    <input type="email"  placeholder="xyz123@gmail.com" required><br>
                    <input type="password" class="pass" placeholder="123@asd#"><br>
                </div>
            </div>
            <label>Select gender :</label>
            <label><input type="radio" name="gender" required>Male</label>
            <label><input type="radio" name="gender" >Female</label>
            <label><input type="radio" name="gender" >Prefer not to say</label>
            <br><br>

            <label>Choose Genre : </label>
            <br>
            <label><input type="checkbox"> Action</label>
            <br>
            <label><input type="checkbox"> Adventure</label>
            <br>
            <label><input type="checkbox"> Romance</label>
            <br>
            <label><input type="checkbox"> Comedy</label>
            <br>
            <label><input type="checkbox"> Horror</label>
            <br>
            <label><input type="checkbox"> Science Fiction</label>
            <br><br>
            <label>Choose no of episodes</label>
            <select >
                <option disabled selected>Select Episodes</option>
                <option>12</option>
                <option>12-48</option>
                <option>48-97</option>
                <option>96+</option>

            </select>
            <br><br>
            <label>Languange preference </label>
            <label><input type="radio" name="lang" >Sub</label>
            <label><input type="radio" name="lang" >Dub</label>
            <label><input type="radio" name="lang" >Either</label>
            <br><br>
            <label>Favourite Character type </label>
            <select >
                <option disabled selected>Select Character</option>
                <option>OP Protagonist</option>
                <option>Villian</option>
                <option>Anti-Hero</option>
                <option>Tsundere</option>
                <option>Comic Relief</option>
            </select>
            <br><br>
            <div class="feedback">
                <label>Feedback</label>
                <textarea class="textarea" placeholder="Enter you feedback..."></textarea>
                <p id="counter">0 characters</p>
            </div>
            <br>
            <div class="center">
                <button type="submit" class="submits">Submit</button>
            </div>
        </form>
    </div>
    <script src="request.js"></script>
</body>

</html>
